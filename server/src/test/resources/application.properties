spring.datasource.url=jdbc:h2:mem:nexus-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.generate-ddl=true
jakarta.persistence.schema-generation.database.action=drop-and-create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
security.jwt.secret=test-secret-with-at-least-32-characters
security.jwt.access-token-ttl=PT15M
security.refresh-token-ttl=P30D
security.password-reset-token-ttl=PT30M
nexus.resilience.key-prefix=nexus-test
nexus.resilience.login.permits=5
nexus.resilience.login.window=PT1M
nexus.resilience.forgot-password.permits=3
nexus.resilience.forgot-password.window=PT10M
nexus.resilience.reset-password.permits=5
nexus.resilience.reset-password.window=PT10M
nexus.resilience.idempotency-ttl=PT24H
nexus.jobs.enabled=false
nexus.jobs.batch-size=100
nexus.jobs.lock-ttl=PT2M
nexus.jobs.qr-expire-interval=30000
nexus.jobs.invitation-expire-interval=30000
nexus.jobs.lfg-expire-interval=60000
nexus.jobs.heartbeat-interval=60000
nexus.jobs.station-heartbeat-timeout=PT3M
nexus.jobs.device-heartbeat-timeout=PT3M
nexus.jobs.token-cleanup-interval=3600000
nexus.jobs.notification-retry-interval=300000
nexus.jobs.retention-interval=86400000
nexus.jobs.notification-retention=P90D
nexus.jobs.chat-retention=P90D
nexus.jobs.audit-retention=P365D
nexus.jobs.session-warning-interval=60000
nexus.jobs.session-ending-warning-before=PT10M
nexus.jobs.payment-reconciliation-interval=600000
