spring.application.name=server
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nexus}
spring.datasource.username=${DB_USERNAME:nexus}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8088}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] correlationId=%X{correlationId} %logger{36} - %msg%n
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
security.jwt.secret=${JWT_SECRET:}
security.jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:PT15M}
security.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:P30D}
security.password-reset-token-ttl=${PASSWORD_RESET_TOKEN_TTL:PT30M}
nexus.resilience.key-prefix=${NEXUS_KEY_PREFIX:nexus}
nexus.resilience.cache-failure-policy=${NEXUS_CACHE_FAILURE_POLICY:FAIL_OPEN}
nexus.resilience.rate-limit-failure-policy=${NEXUS_RATE_LIMIT_FAILURE_POLICY:FAIL_CLOSED}
nexus.resilience.idempotency-failure-policy=${NEXUS_IDEMPOTENCY_FAILURE_POLICY:FAIL_CLOSED}
nexus.resilience.lock-failure-policy=${NEXUS_LOCK_FAILURE_POLICY:FAIL_CLOSED}
nexus.resilience.default-ttl=${NEXUS_CACHE_DEFAULT_TTL:PT5M}
nexus.resilience.lock-timeout=${NEXUS_LOCK_TIMEOUT:PT10S}
nexus.resilience.idempotency-ttl=${NEXUS_IDEMPOTENCY_TTL:PT24H}
nexus.resilience.online-state-ttl=${NEXUS_ONLINE_STATE_TTL:PT2M}
nexus.resilience.login.permits=${NEXUS_RATE_LOGIN_PERMITS:5}
nexus.resilience.login.window=${NEXUS_RATE_LOGIN_WINDOW:PT1M}
nexus.resilience.forgot-password.permits=${NEXUS_RATE_FORGOT_PASSWORD_PERMITS:3}
nexus.resilience.forgot-password.window=${NEXUS_RATE_FORGOT_PASSWORD_WINDOW:PT10M}
nexus.resilience.reset-password.permits=${NEXUS_RATE_RESET_PASSWORD_PERMITS:5}
nexus.resilience.reset-password.window=${NEXUS_RATE_RESET_PASSWORD_WINDOW:PT10M}
nexus.resilience.qr-confirm.permits=${NEXUS_RATE_QR_CONFIRM_PERMITS:10}
nexus.resilience.qr-confirm.window=${NEXUS_RATE_QR_CONFIRM_WINDOW:PT1M}
nexus.resilience.invitation.permits=${NEXUS_RATE_INVITATION_PERMITS:20}
nexus.resilience.invitation.window=${NEXUS_RATE_INVITATION_WINDOW:PT1M}
nexus.resilience.order.permits=${NEXUS_RATE_ORDER_PERMITS:10}
nexus.resilience.order.window=${NEXUS_RATE_ORDER_WINDOW:PT1M}
nexus.payment.provider=${PAYMENT_PROVIDER:mock}
nexus.payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:}
nexus.payment.webhook-replay-window=${PAYMENT_WEBHOOK_REPLAY_WINDOW:PT5M}
nexus.mqtt.provider=${MQTT_PROVIDER:mock}
nexus.mqtt.tls-required=${MQTT_TLS_REQUIRED:true}
nexus.notification.push-provider=${NOTIFICATION_PUSH_PROVIDER:mock}
nexus.notification.email-provider=${NOTIFICATION_EMAIL_PROVIDER:mock}
nexus.voice.provider=${VOICE_PROVIDER:mock}
nexus.voice.provider-key=${VOICE_PROVIDER_KEY:}
nexus.voice.webhook-secret=${VOICE_WEBHOOK_SECRET:}
nexus.voice.token-ttl=${VOICE_TOKEN_TTL:PT5M}
nexus.voice.webhook-replay-window=${VOICE_WEBHOOK_REPLAY_WINDOW:PT5M}
nexus.voice.mock-failure=${VOICE_MOCK_FAILURE:false}
nexus.jobs.enabled=${NEXUS_JOBS_ENABLED:true}
nexus.jobs.batch-size=${NEXUS_JOBS_BATCH_SIZE:100}
nexus.jobs.lock-ttl=${NEXUS_JOBS_LOCK_TTL:PT2M}
nexus.jobs.qr-expire-interval=${NEXUS_JOBS_QR_EXPIRE_INTERVAL:30000}
nexus.jobs.invitation-expire-interval=${NEXUS_JOBS_INVITATION_EXPIRE_INTERVAL:30000}
nexus.jobs.lfg-expire-interval=${NEXUS_JOBS_LFG_EXPIRE_INTERVAL:60000}
nexus.jobs.heartbeat-interval=${NEXUS_JOBS_HEARTBEAT_INTERVAL:60000}
nexus.jobs.station-heartbeat-timeout=${NEXUS_JOBS_STATION_HEARTBEAT_TIMEOUT:PT3M}
nexus.jobs.device-heartbeat-timeout=${NEXUS_JOBS_DEVICE_HEARTBEAT_TIMEOUT:PT3M}
nexus.jobs.token-cleanup-interval=${NEXUS_JOBS_TOKEN_CLEANUP_INTERVAL:3600000}
nexus.jobs.notification-retry-interval=${NEXUS_JOBS_NOTIFICATION_RETRY_INTERVAL:300000}
nexus.jobs.retention-interval=${NEXUS_JOBS_RETENTION_INTERVAL:86400000}
nexus.jobs.notification-retention=${NEXUS_JOBS_NOTIFICATION_RETENTION:P90D}
nexus.jobs.chat-retention=${NEXUS_JOBS_CHAT_RETENTION:P90D}
nexus.jobs.audit-retention=${NEXUS_JOBS_AUDIT_RETENTION:P365D}
nexus.jobs.session-warning-interval=${NEXUS_JOBS_SESSION_WARNING_INTERVAL:60000}
nexus.jobs.session-ending-warning-before=${NEXUS_JOBS_SESSION_ENDING_WARNING_BEFORE:PT10M}
nexus.jobs.payment-reconciliation-interval=${NEXUS_JOBS_PAYMENT_RECONCILIATION_INTERVAL:600000}
