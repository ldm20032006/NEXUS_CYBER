<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEXUS Offline</title>
    <style>
      :root {
        color: #172033;
        background: #f7f8fb;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }
      main {
        width: min(480px, 100%);
        display: grid;
        gap: 12px;
        padding: 24px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
      }
      h1,
      p {
        margin: 0;
      }
      p {
        color: #64748b;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NEXUS is offline</h1>
      <p>Only the static app shell is available without network. Sign-in, wallet, orders, QR, admin data and other API-backed workflows require a connection.</p>
    </main>
  </body>
</html>
