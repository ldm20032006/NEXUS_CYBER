name: nexus

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexus
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    networks:
      - nexus
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t nexus/healthcheck -m ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nexus}
      DB_USERNAME: ${POSTGRES_USER:-nexus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P30D}
      NEXUS_KEY_PREFIX: ${NEXUS_KEY_PREFIX:-nexus}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_PROVIDER: ${MQTT_PROVIDER:-mock}
      MQTT_BROKER_URL: tcp://mqtt:1883
      MQTT_TLS_REQUIRED: ${MQTT_TLS_REQUIRED:-false}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
      VOICE_PROVIDER: ${VOICE_PROVIDER:-mock}
      VOICE_PROVIDER_KEY: ${VOICE_PROVIDER_KEY:-}
      VOICE_WEBHOOK_SECRET: ${VOICE_WEBHOOK_SECRET:-}
      NOTIFICATION_PUSH_PROVIDER: ${NOTIFICATION_PUSH_PROVIDER:-mock}
      NOTIFICATION_EMAIL_PROVIDER: ${NOTIFICATION_EMAIL_PROVIDER:-mock}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-8088}}
      NEXUS_JOBS_ENABLED: ${NEXUS_JOBS_ENABLED:-true}
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - nexus
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-/ws}
        VITE_APP_NAME: ${VITE_APP_NAME:-NEXUS Smart Cyber Esports}
        VITE_ENABLE_PWA: ${VITE_ENABLE_PWA:-true}
        VITE_ENABLE_VOICE: ${VITE_ENABLE_VOICE:-false}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8088}:80"
    networks:
      - nexus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  nexus:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mqtt_data:
  mqtt_log:
